log_level = "INFO"

[vm_provider]
type = "proxmox"

[vm_provider.settings]
host = "192.168.1.10"
port = 8006
user = "root@pam"
token_name = "detonator"
token_value = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
verify_ssl = false
node = "pve"

[storage]
data_dir = "data"
db_path = "data/detonator.db"

# Agents are named bindings of a VM + snapshot to the in-VM agent's HTTP endpoint.
# The first entry is the default used when a run doesn't specify an agent by name.
# Add more entries to make additional sandbox images available for selection.
[[agents]]
name = "win11-sandbox"
vm_id = "100"
snapshot = "clean"
port = 8000
health_timeout_sec = 60
health_poll_sec = 2

[timeouts]
provision_sec = 120
preflight_sec = 30
detonate_sec = 120
collect_sec = 60
enrich_sec = 120

# Egress providers control how the agent VM reaches the internet.
# The orchestrator acts as the L3 gateway between the sandbox network and the
# upstream path — all routing, NAT, and firewall rules live in the orchestrator's
# own kernel, not in Proxmox.  Proxmox only needs to put the agent VM on the
# same L2 bridge as the orchestrator's sandbox NIC (ens19 / vmbr1).

[egress.direct]
type = "direct"

[egress.direct.settings]
# NIC on the orchestrator with internet access (LAN side).
uplink_interface = "ens18"
# CIDR of the sandbox network (orchestrator ens19 / agent VM).
sandbox_cidr = "192.168.100.0/24"
# LAN gateway reachable via uplink_interface (required for policy routing).
gateway = "192.168.0.1"
# LAN subnet to block from the sandbox (isolation invariant).
lan_cidr = "192.168.1.0/24"

# USB tether egress — routes sandbox traffic through a USB-tethered iPhone.
# The interface name is assigned by the ipheth kernel driver and is derived
# from the phone's MAC address (enx<mac-without-colons>).  Replace the
# placeholder below with the actual interface name on your host.
# The iPhone Personal Hotspot DHCP server uses the 172.20.10.0/28 subnet;
# the host gets an address like 172.20.10.2.  See docs/tether-setup.md for
# Proxmox USB passthrough, kernel/usbmuxd prereqs, and the systemd-networkd
# unit that runs DHCP without stealing the default route.
#
# [egress.tether]
# type = "tether"
#
# [egress.tether.settings]
# uplink_interface = "enxea98eebb97c7"  # replace with your interface name
# sandbox_cidr = "192.168.100.0/24"
# gateway = "172.20.10.1"              # iPhone hotspot gateway (default for iOS Personal Hotspot)
# lan_cidr = "192.168.1.0/24"

# VPN egress provider is not yet implemented (Phase 3 deferred).
#
# [egress.vpn]
# type = "vpn"
#
# [egress.vpn.settings]
# uplink_interface = "wg0"
# sandbox_cidr = "192.168.100.0/24"
# lan_cidr = "192.168.1.0/24"
# wg_config = "/etc/wireguard/detonator.conf"

# HAR chain filter — controls which requests are written to har_chain.json.
# noise_domains supplements (does not replace) the built-in tracker list.
[filter]
noise_domains = [
  "google-analytics.com",
  "www.google-analytics.com",
  "ssl.google-analytics.com",
  "googletagmanager.com",
  "www.googletagmanager.com",
  "doubleclick.net",
  "ad.doubleclick.net",
  "googlesyndication.com",
  "connect.facebook.net",
  "www.facebook.com",
  "facebook.com",
  "platform.twitter.com",
  "t.co",
  "static.hotjar.com",
  "script.hotjar.com",
  "cdn.segment.com",
  "api.segment.io",
  "intercom.io",
  "widget.intercom.io",
  "bat.bing.com",
  "mc.yandex.ru",
  "analytics.tiktok.com",
  "snap.licdn.com",
]
noise_resource_types = ["ping", "preflight", "csp-violation-report", "beacon"]

# Analysis pipeline — controls which technique-detection modules run.
# modules: sigma (YAML rulepack).
# rules_dirs: list of directories scanned for *.yml / *.yaml Sigma rules.
# Add your own rule directories here — they will be loaded alongside the default.
[analysis]
modules = ["sigma"]
rules_dirs = ["detonator/analysis/rules"]
# rules_dirs = ["detonator/analysis/rules", "~/.detonator/rules"]

# Enrichment pipeline — controls which modules run and per-enricher exclusions.
# Host entries match exactly OR as a "*.<host>" suffix (e.g. "googleapis.com"
# also excludes "fonts.googleapis.com"). Exclusions are PER-ENRICHER: a host
# excluded from whois still runs through dns/tls/favicon unless listed there too.
[enrichment]
modules = ["whois", "dns", "tls", "favicon"]

# CDN/cloud/SaaS registrants are always the provider, never the adversary.
[enrichment.whois]
exclude_hosts = [
  "jsdelivr.net",
  "unpkg.com",
  "cdnjs.cloudflare.com",
  "cloudflare.com",
  "googleapis.com",
  "gstatic.com",
  "google-analytics.com",
  "googletagmanager.com",
  "doubleclick.net",
  "amazonaws.com",
  "cloudfront.net",
  "azureedge.net",
  "akamaihd.net",
  "akamaized.net",
  "fbcdn.net",
  "bootstrapcdn.com",
  "jquery.com",
]

# Same set — anycast ranges resolve to known provider blocks, low signal.
[enrichment.dns]
exclude_hosts = [
  "jsdelivr.net",
  "unpkg.com",
  "cdnjs.cloudflare.com",
  "cloudflare.com",
  "googleapis.com",
  "gstatic.com",
  "google-analytics.com",
  "googletagmanager.com",
  "doubleclick.net",
  "amazonaws.com",
  "cloudfront.net",
  "azureedge.net",
  "akamaihd.net",
  "akamaized.net",
  "fbcdn.net",
  "bootstrapcdn.com",
  "jquery.com",
]

# Narrower — only shared-tenant CDNs where the leaf cert is the provider's.
# Per-tenant certs on amazonaws.com/cloudfront.net do carry signal; keep those.
[enrichment.tls]
exclude_hosts = [
  "jsdelivr.net",
  "unpkg.com",
  "cdnjs.cloudflare.com",
  "googleapis.com",
  "gstatic.com",
]

# CDN origins don't serve a meaningful /favicon.ico.
[enrichment.favicon]
exclude_hosts = [
  "jsdelivr.net",
  "unpkg.com",
  "cdnjs.cloudflare.com",
  "cloudflare.com",
  "googleapis.com",
  "gstatic.com",
  "google-analytics.com",
  "googletagmanager.com",
  "doubleclick.net",
  "amazonaws.com",
  "cloudfront.net",
  "azureedge.net",
  "akamaihd.net",
  "akamaized.net",
  "fbcdn.net",
  "bootstrapcdn.com",
  "jquery.com",
]
