log_level = "INFO"

[vm_provider]
type = "proxmox"

[vm_provider.settings]
host = "192.168.1.10"
port = 8006
user = "root@pam"
token_name = "detonator"
token_value = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
verify_ssl = false
node = "pve"

[storage]
data_dir = "data"
db_path = "data/detonator.db"

# Agents are named bindings of a VM + snapshot to the in-VM agent's HTTP endpoint.
# The first entry is the default used when a run doesn't specify an agent by name.
# Add more entries to make additional sandbox images available for selection.
[[agents]]
name = "win11-sandbox"
vm_id = "100"
snapshot = "clean"
port = 8000
health_timeout_sec = 60
health_poll_sec = 2

[timeouts]
provision_sec = 120
preflight_sec = 30
detonate_sec = 120
collect_sec = 60
enrich_sec = 120

# Egress providers control how the agent VM reaches the internet.
# The orchestrator acts as the L3 gateway between the sandbox network and the
# upstream path — all routing, NAT, and firewall rules live in the orchestrator's
# own kernel, not in Proxmox.  Proxmox only needs to put the agent VM on the
# same L2 bridge as the orchestrator's sandbox NIC (ens19 / vmbr1).

[egress.direct]
type = "direct"

[egress.direct.settings]
# NIC on the orchestrator with internet access (LAN side).
uplink_interface = "ens18"
# CIDR of the sandbox network (orchestrator ens19 / agent VM).
sandbox_cidr = "192.168.100.0/24"
# LAN subnet to block from the sandbox (isolation invariant).
lan_cidr = "192.168.1.0/24"

# VPN and tether egress providers are not yet implemented (Phase 3 deferred).
# Uncomment and fill in once those providers land.
#
# [egress.vpn]
# type = "vpn"
#
# [egress.vpn.settings]
# uplink_interface = "wg0"
# sandbox_cidr = "192.168.100.0/24"
# lan_cidr = "192.168.1.0/24"
# wg_config = "/etc/wireguard/detonator.conf"
#
# [egress.tether]
# type = "tether"
#
# [egress.tether.settings]
# uplink_interface = "usb0"
# sandbox_cidr = "192.168.100.0/24"
# lan_cidr = "192.168.1.0/24"

# HAR chain filter — controls which requests are written to har_chain.json.
# noise_domains supplements (does not replace) the built-in tracker list.
[filter]
noise_domains = []
noise_resource_types = []

# Enrichment pipeline — controls which modules run and per-enricher exclusions.
# Host entries match exactly OR as a "*.<host>" suffix (e.g. "googleapis.com"
# also excludes "fonts.googleapis.com"). Exclusions are PER-ENRICHER: a host
# excluded from whois still runs through dns/tls/favicon unless listed there too.
[enrichment]
modules = ["whois", "dns", "tls", "favicon"]

# CDN/cloud/SaaS registrants are always the provider, never the adversary.
[enrichment.whois]
exclude_hosts = [
  "jsdelivr.net", "unpkg.com", "cdnjs.cloudflare.com", "cloudflare.com",
  "googleapis.com", "gstatic.com", "google-analytics.com", "googletagmanager.com",
  "doubleclick.net", "amazonaws.com", "cloudfront.net", "azureedge.net",
  "akamaihd.net", "akamaized.net", "fbcdn.net", "bootstrapcdn.com", "jquery.com",
]

# Same set — anycast ranges resolve to known provider blocks, low signal.
[enrichment.dns]
exclude_hosts = [
  "jsdelivr.net", "unpkg.com", "cdnjs.cloudflare.com", "cloudflare.com",
  "googleapis.com", "gstatic.com", "google-analytics.com", "googletagmanager.com",
  "doubleclick.net", "amazonaws.com", "cloudfront.net", "azureedge.net",
  "akamaihd.net", "akamaized.net", "fbcdn.net", "bootstrapcdn.com", "jquery.com",
]

# Narrower — only shared-tenant CDNs where the leaf cert is the provider's.
# Per-tenant certs on amazonaws.com/cloudfront.net do carry signal; keep those.
[enrichment.tls]
exclude_hosts = [
  "jsdelivr.net", "unpkg.com", "cdnjs.cloudflare.com",
  "googleapis.com", "gstatic.com",
]

# CDN origins don't serve a meaningful /favicon.ico.
[enrichment.favicon]
exclude_hosts = [
  "jsdelivr.net", "unpkg.com", "cdnjs.cloudflare.com", "cloudflare.com",
  "googleapis.com", "gstatic.com", "google-analytics.com", "googletagmanager.com",
  "doubleclick.net", "amazonaws.com", "cloudfront.net", "azureedge.net",
  "akamaihd.net", "akamaized.net", "fbcdn.net", "bootstrapcdn.com", "jquery.com",
]
